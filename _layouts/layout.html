<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; line-height: 1.6; }
    .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
    header, footer { border-bottom: 1px solid #ccc; }
    footer { border-top: 1px solid #ccc; border-bottom: 0; margin-top: 2rem; }
    nav ul { list-style: none; display: flex; gap: 1rem; padding: 0; margin: 0.5rem 0 0; }
    nav a { text-decoration: none; }
    main h1 { margin-top: 0.5rem; }
    .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .card { border: 1px solid #999; border-radius: 8px; padding: 1rem; }
  </style>
</head>
<body>
  {% include header.html %}
  <main class="container">
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>
